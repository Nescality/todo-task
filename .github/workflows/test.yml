name: Tests

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install
        run: npm install

      - name: run tests
        run: |
          cp src/solution.js src/index.js
          npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git checkout source -- .
          rm -f src/solution.js
          git add -A
          git commit -m "auto" || echo "no changes"
          git push origin main --force
